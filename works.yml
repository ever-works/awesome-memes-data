name: Awesome Memes
initial_prompt: Directory of best / well known (or less known, but funny) memes.
  Make sure each memo has a picture at minimum and some description that include
  what does it mean / why it's funny, how it was created (if known), some
  context etc. Picture is best. Either found existing picture for meme or create
  one.
providers:
  contentExtractor: local-content-extractor
  search: tavily
  pipeline: agent-pipeline
  ai: openrouter
website_repo: ever-works/awesome-memes-website
schedule:
  enabled: true
  cadence: daily

markdown: "## Overview\\n\\nLoss is a four-panel comic strip from the webcomic
  Ctrl+Alt+Del published on June 2, 2008, depicting the miscarriage of the
  character Lilah. The strip's dramatic shift from comedy to tragedy led to
  widespread mockery and parody online.\\n\\n## Origin\\n\\nCreated by Tim
  Buckley, the strip titled \\\"Loss\\\" appeared in Ctrl+Alt+Del and was
  intended as a serious storyline. The unexpected tone shift provoked a negative
  reaction from readers, sparking anti-fandom and meme creation.\\n\\n##
  Spread\\n\\nFollowing its release, the strip was parodied by numerous
  webcomics and internet communities. On 4chan's /v/ board, users began creating
  minimalist representations using vertical bars and underscores, such as \\\"|
  || || |_\\\", leading to the phrase \\\"Is this Loss?\\\" as a meme format.
  The meme proliferated across platforms, inspiring countless variations and
  remixes.\\n\\n## Legacy\\n\\nOver a decade later, Loss remains one of the
  internet's most recognizable memes, referenced in articles by Polygon, io9,
  and Select All. Tim Buckley has acknowledged the meme's persistence, sometimes
  finding it amusing. The strip's ten-year anniversary in 2018 saw Buckley
  publish a self-referential parody on the comic's website."

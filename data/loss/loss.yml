name: Loss
description: Loss, also known as CADbortion, Loss.jpg and | || || |_, is an
  iconic four-panel comic strip from the webcomic Ctrl+Alt+Del in which the
  female lead suffers a miscarriage. The strip's unexpected dramatic shift from
  comedy to tragedy sparked widespread mockery and parody online, becoming a
  pervasive meme format represented by minimalist interpretations of its panels.

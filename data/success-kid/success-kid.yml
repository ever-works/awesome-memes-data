name: Success Kid
description: Success Kid is an Internet meme featuring a baby clenching a
  fistful of sand with a determined facial expression. Originating from a 2007
  Flickr photo, it evolved from the 'I Hate Sandcastles' meme to represent small
  personal victories and good fortune. The image has been licensed for
  commercial use and used in notable campaigns, including a White House
  immigration reform tweet and a GoFundMe for the subject's father's kidney
  transplant.

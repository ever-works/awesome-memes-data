markdown: >
  ## Overview


  Success Kid is an Internet meme characterized by a photo of a baby (Sammy
  Griner) with a determined expression, clutching a fistful of sand. The meme is
  used to convey feelings of success or triumph over minor achievements.


  ## Origin


  The original photograph was taken by Laney Griner (mother) and uploaded to
  Flickr on August 31, 2007, under the title "Why I oughta...". The photo shows
  her son, Sam, at the beach attempting to eat sand.


  ## Evolution


  Initially, the image was used in memes with captions like "I Hate
  Sandcastles," implying the boy had destroyed another child's sandcastle.
  However, the interpretation shifted to focus on the boy's expression as a
  gesture of self-congratulation, leading to the "Success Kid" meme with
  captions celebrating small victories and good fortune.


  ## Commercial Use and Licensing


  Laney Griner licensed the image through Getty Images and later managed
  licensing herself. The image has appeared in advertisements for Coca-Cola and
  Virgin Mobile UK, and was used by the White House in 2013 to promote
  immigration reform. Griner has also taken legal action against unauthorized
  use, including a lawsuit against a fireworks company and a cease-and-desist
  letter to a U.S. Representative.


  ## Notable Uses


  - In 2013, the White House tweeted the Success Kid meme to support immigration
  reform legislation.

  - In 2015, the Griner family used the meme in a GoFundMe campaign to raise
  funds for Sam's father's kidney transplant, which gained significant traction
  after being shared on Reddit.

  - The meme has been featured on merchandise sold by Hot Topic.


  ## Cultural Impact


  Success Kid has been described as "likely the Internet's most famous baby" by
  CNN. The meme's popularity has led to discussions about the ethics of
  monetizing a child's image, which the Griner family has addressed by
  emphasizing the joy the meme brings to people.

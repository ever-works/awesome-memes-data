markdown: >
  # Cigar Guy


  ## Overview

  Cigar Guy refers to Rupesh Shingadia, a golf fan photographed at the 2010
  Ryder Cup wearing a ginger wig, Groucho Marx moustache, and smoking a cigar.
  The image became an internet meme due to his distinctive appearance.


  ## Origin

  The photo was taken by Daily Mail photographer Mark Pain during Tiger Woods'
  chip shot at the 18th green. The man's face was noticed for its enthusiastic
  expression and costume.


  ## Spread and Usage

  After the photo went viral, Shingadia was identified as a 30-year-old
  investment analyst from south London. Internet users began photoshopping his
  face into other famous sporting events and scenes, creating a meme that
  highlights his positive, wide-eyed expression.


  ## Cultural Impact

  The meme exemplifies how a candid photograph of a spectator can achieve fame
  through online sharing and photoshop remixes, becoming a symbol of
  enthusiastic fandom.

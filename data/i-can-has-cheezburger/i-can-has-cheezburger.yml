name: I Can Has Cheezburger?
description: The 'I Can Has Cheezburger?' meme features a picture of a fluffy
  cat (often a British Shorthair) with a caption written in broken English,
  typically 'I Can Has Cheezburger?'. Originating from a 2007 photograph posted
  on somethingawful.com, it became the foundation of the popular humor site
  ICanHasCheezburger.com, which helped launch the image macro format and
  lolspeak into mainstream internet culture.

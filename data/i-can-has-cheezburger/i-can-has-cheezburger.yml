markdown: >
  # I Can Has Cheezburger?


  ## Overview

  The 'I Can Has Cheezburger?' meme is an image macro that pairs a picture of a
  cat with a caption written in a playful, broken English dialect known as
  lolspeak.


  ## Origin

  The meme originated from a photograph of a cat posted on somethingawful.com in
  2007. The image was paired with the caption 'I Can Has Cheezburger?' and
  shared on the site's 'Image Macros' forum. The phrase quickly spread, leading
  to the creation of the ICanHasCheezburger.com website in January 2007 by Eric
  Nakagawa (known as 'Happycat') and Kari Unebasami (known as 'Professeur
  Burger').


  ## Spread

  The site popularized the lolspeak language and the image macro format,
  inspiring countless derivative memes and contributing to the rise of
  user-generated humor sites. The meme's success demonstrated the power of
  simple, repeatable formats in viral content.


  ## Cultural Impact

  'I Can Has Cheezburger?' is credited with helping to establish the image macro
  as a dominant meme format and influencing the development of internet culture
  around animal pictures and humorous captions. It also led to the publication
  of books and a line of merchandise.


  ## Notes

  The meme is often referenced in discussions about the early evolution of
  internet memes and the role of user communities in meme propagation.

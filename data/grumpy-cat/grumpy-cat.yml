  internet meme known for her permanently grumpy facial expression caused by
  feline dwarfism and an underbite. The meme originated from a photo posted on
  Reddit in September 2012 and quickly spread across social media, spawning
  countless parodies and merchandise. Grumpy Cat remains one of the most
  recognizable and influential memes in internet culture.

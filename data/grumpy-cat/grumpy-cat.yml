markdown: >
  # Grumpy Cat


  ## Overview


  Grumpy Cat, born Tardar Sauce (April 4, 2012 – May 14, 2019), was an American
  internet celebrity cat known for her permanently "grumpy" facial appearance,
  which made her a popular subject for memes and online humor.


  ## Origin


  The meme began when a photograph of Tardar Sauce was posted on September 22,
  2012, on the social news website Reddit by her owner's brother, Bryan
  Bundesen. Reddit users quickly created image macros and parodies, depicting
  her with cynical, humorous captions.


  ## Meaning and Humor


  The humor stems from the cat's perpetually dissatisfied expression, which is
  juxtaposed with captions expressing negative or sarcastic viewpoints on
  everyday situations. The contrast between the cute animal and the grumpy
  demeanor creates an ironic, relatable comedy.


  ## Popularity


  As of June 3, 2023, Grumpy Cat had 8.3 million total likes on Facebook, 2.5
  million followers on Instagram, 1.3 million followers on Twitter, and 275,000
  subscribers on YouTube. She won numerous awards, including the Webby Award for
  Meme of the Year in 2013 and a Lifetime Achievement Award at the 2013
  Friskies.


  ## Merchandise and Media


  Grumpy Cat's likeness was licensed for a wide range of products, including
  T-shirts, mugs, stuffed toys, calendars, books, comic books, and a video game
  titled *Grumpy Cat: Unimpressed*. She also starred in the Lifetime film
  *Grumpy Cat's Worst Christmas Ever* (2014) and appeared in the documentary
  *Lil Bub & Friendz*.


  ## Legacy


  Following her death in May 2019 due to complications from a urinary tract
  infection, Grumpy Cat's influence endures as one of the most iconic internet
  memes. Her image continues to be used in memes, and she remains a reference
  point for "grumpy" humor online.

name: Hey Blizzard, I heard you like China's money ?
description: This meme critiques Blizzard Entertainment's perceived appeasement
  of China, featuring a screenshot from a South Park episode where characters
  satirize corporate censorship. It became a viral protest meme after Blizzard
  punished a Hearthstone player for supporting Hong Kong protests. The image is
  hosted on Reddit's i.redd.it domain.

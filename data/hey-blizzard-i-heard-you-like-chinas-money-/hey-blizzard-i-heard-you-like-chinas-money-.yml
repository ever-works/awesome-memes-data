markdown: >-
  # Hey Blizzard, I heard you like China's money ?


  ## Overview

  The meme uses a still from the South Park episode 'Band in China', which mocks
  Hollywood and gaming companies for self-censoring to access the Chinese
  market. The caption directly addresses Blizzard following their controversy
  with player Blitz Chung.


  ## Origin

  The image originates from South Park Studios, aired in 2019. The meme gained
  traction on Reddit after Blizzard's actions in October 2019.


  ## Popularity

  This post received over 201,000 upvotes and thousands of awards, reflecting
  strong community sentiment.


  ## Usage

  Used to criticize companies perceived as prioritizing market access over
  ethical stances, especially regarding human rights and censorship.


  ## License

  The image is a copyrighted still from South Park; its use in memes falls under
  fair use for commentary and parody. Reddit hosting does not alter copyright
  status.

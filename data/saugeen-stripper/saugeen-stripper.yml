markdown: >
  # Saugeen Stripper


  ## Overview

  The Saugeen Stripper meme comes from a 2005 photograph of an 18-year-old woman
  performing a striptease at a dorm party at Saugeen-Maitland Hall, University
  of Western Ontario.


  ## Origin

  After being asked to perform, the student did a striptease while attendees
  took photos. The images were uploaded to the Internet and quickly spread.


  ## Spread and Media Coverage

  The incident was covered by Canadian media outlets such as the Toronto Star,
  The London Free Press, National Post, and local London A-Channel News, as well
  as outlets in the US, UK, and elsewhere.


  ## Cultural Impact

  The meme sparked debate about how much control institutions have over student
  behavior on campus and contributed to the university's reputation as a party
  school.

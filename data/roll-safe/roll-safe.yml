markdown: >-
  # Roll Safe


  Roll Safe is an Internet meme featuring a still image of British filmmaker and
  actor Kayode Ewumi portraying the character Reece Simpson (also known as Roll
  Safe) tapping his finger on his head.


  ## Origin


  The character Roll Safe first appeared in Vine in 2015. The Hood Documentary
  episode was published in June 2016. The image became a reaction image on
  British Twitter accounts later in 2016, and its popularity surged in late
  January 2017, particularly within the Black Twitter community.


  ## Usage


  The meme is typically used with captions that mock poor decision-making and
  failures in critical thinking. A common format is "You can't X, if there is no
  Y". For example, "You can't fail an exam if there is no exam".


  ## Cultural Impact


  Roll Safe was featured on numerous 'best memes of 2017' lists from outlets
  such as Thrillist, Complex, BuzzFeed News, The Daily Dot, Insider, BBC News,
  PCMag, Washington Post, PopBuzz, and MTV UK. It was also a finalist in the
  10th Shorty Awards. In 2024, The Daily Dot referred to it as "one of the most
  indelible images" of the 2010s Internet.


  ## Related Links


  - [Roll Safe at Know Your Meme](https://knowyourmeme.com/memes/roll-safe)

  - [Hood Documentary on YouTube](https://www.youtube.com/watch?v=0g2VxLD0y7o)
  (example)


  ## Licensing



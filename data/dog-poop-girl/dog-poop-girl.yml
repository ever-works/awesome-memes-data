markdown: >
  # Dog Poop Girl


  ## Overview

  The Dog Poop Girl meme originates from a 2005 photograph taken in the Seoul
  Metropolitan Subway showing a woman who ignored requests to clean up after her
  dog's feces.


  ## Origin

  Passenger Miss Kim captured photos of the incident and posted them on a
  popular Korean website. The images quickly became one of the most searched
  terms on Korean web portals.


  ## Spread and Vigilantism

  Internet users launched a vigilante campaign to identify the woman, publishing
  her personal information online. She was linked to a university, which
  received massive internet traffic. The humiliation reportedly led her to quit
  school.


  ## Cultural Impact

  The meme illustrates the power of online crowdsourcing and the consequences of
  public shaming in the digital age, sparking debates about privacy and internet
  vigilantism.

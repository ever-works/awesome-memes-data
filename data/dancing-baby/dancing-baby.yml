markdown: >
  # Dancing Baby


  ## Overview

  The Dancing Baby is a 3D-rendered animation of a baby dancing the cha-cha,
  widely recognized as one of the first internet memes.


  ## Origin

  Created in 1996 by Michael Girard, Robert Lurye, and John Chadwick using
  Character Studio software, the animation was originally a technical demo to
  showcase realistic movement.


  ## Spread

  The file spread via email chains and early web forums in the late 1990s,
  gaining popularity on sites like Albino Blacksheep and later on television
  shows such as *Ally McBeal*. Its widespread sharing exemplified early viral
  content before the advent of social media.


  ## Cultural Impact

  As one of the earliest examples of an internet meme, the Dancing Baby
  illustrates how digital media can be remixed, shared, and transformed by
  users, paving the way for modern meme culture.


  ## Notes

  The animation is often cited in discussions about the evolution of memes and
  the concept of viral media.

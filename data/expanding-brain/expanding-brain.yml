name: Expanding brain
description: The expanding brain meme originated in 2017 on Tumblr and 4chan,
  where users posted images of progressively larger brains paired with
  increasingly 'smart' sounding words or phrases. It illustrates the concept of
  intellectual escalation, often used sarcastically to mock overcomplicated
  thinking.

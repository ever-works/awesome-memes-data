markdown: >-
  ## Overview


  The expanding brain meme is an image macro series that shows a sequence of
  brain images growing in size, each accompanied by text that represents
  increasing levels of intelligence or enlightenment.


  ## Origin


  First appearing in 2017 on platforms like Tumblr and 4chan, the meme began
  with users bragging about their brain sizes, pairing photos of different-sized
  brains with "smart" sounding words.


  ## Meaning and Usage


  Typically used to depict a progression of ideas, from mundane to highly
  intellectual, often with a sarcastic or humorous twist. The format can be
  adapted to show any escalating scale, such as "who-whom-whomst" progression of
  words.


  ## Variations


  Many variations exist, substituting the brain images with other expanding
  objects (e.g., galaxies, profit charts) while keeping the same textual
  escalation format.

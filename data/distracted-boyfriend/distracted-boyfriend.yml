markdown: >-
  ## Overview


  Distracted Boyfriend is an object labeling stock photo series that became a
  popular internet meme. The photo shows a man turning his head to look at a
  woman walking by while his girlfriend looks on disapprovingly.


  ## Origin


  The source image was taken by photographer Antonio Guillem and posted on
  iStock on November 1, 2015. The earliest known captioned version appeared in a
  Turkish Facebook group in early 2017.


  ## Spread


  The meme gained widespread popularity in early 2017 after being shared on
  Instagram and Twitter. It has been used in numerous variations, including
  political parodies, brand comparisons, and recreations in real life and at
  events like San Diego Comic-Con.


  ## Cultural Impact


  The meme was named "Meme of the Year" at the 10th annual Shorty Awards in
  2018. It has been referenced in mainstream media, including the New York
  Times, and has inspired numerous derivatives and spin-offs.

name: Distracted Boyfriend
description: Distracted Boyfriend, also known as Man Looking at Other Woman, is
  an object labeling stock photo series in which a man looks at the backside of
  a woman walking by while another woman, presumably his romantic partner, looks
  on disapprovingly. The meme originated from a stock photo taken by Antonio
  Guillem and posted on iStock in November 2015, gaining widespread popularity
  in early 2017 through social media platforms like Instagram and Twitter.

markdown: >-
  # Ranked Lists


  ## Overview

  Ranked Lists is a phrasal template meme that uses the format of a ranked list
  to humorously express the pointlessness of ranking items, while simultaneously
  subverting the message by naming a specific item as the best in the final
  position.


  ## Origin

  The earliest known usage was posted by Redditor ocentertainment in the
  /r/MarvelStudios subreddit. The post presented a mock ranking of Marvel
  Cinematic Universe films, arguing that ranking is pointless because each film
  is so different, but concluded with 'Thor: The Dark World' as the worst film
  in the series. The post received over 18,000 points and 1,100 comments in one
  month.


  ## Spread

  On June 22, 2018, Twitter user @WaltsFrzenHead tweeted a ranking of Pixar
  films with a similar structure, which received over 20,000 retweets and
  122,000 likes in less than a year. The following day, @yngjstice tweeted a
  ranking of X-Men characters. The format gained further popularity when
  @harleivy tweeted a ranking of Disney princesses on June 24, 2018, receiving
  over 100,000 retweets and 352,000 likes in three days. Subsequent rankings of
  Lorde songs and other topics spread widely, attracting coverage from media
  outlets like PopBuzz and Mashable.


  ## Examples

  - Marvel Cinematic Universe ranking (origin)

  - Pixar films ranking (@WaltsFrzenHead)

  - X-Men characters ranking (@yngjstice)

  - Disney princesses ranking (@harleivy)

  - Lorde songs ranking (@nighttimemytime)


  ## Cultural Impact

  The meme highlights the absurdity of attempting to rank subjective experiences
  while participating in the very act it critiques, creating a self-referential
  humorous twist that resonated across social media platforms.

markdown: >
  # Parked Domain Girl


  ## Overview

  The Parked Domain Girl is a stock photograph of a young blonde college woman
  that became widely circulated online as the default image for parked domain
  pages operated by Demand Media.


  ## Origin

  The photo was uploaded to iStockphoto in 2005 by Dustin Steller. After an
  online campaign to identify the woman, it was revealed she is the sister of
  Dustin Steller. The picture was taken in Unity Village, Kansas City area.


  ## Spread and Usage

  Because Demand Media buys generic domain names and fills them with
  advertising, the image appears on countless parked domains. Internet users
  have created hundreds of variations, adding captions, altering the background,
  or inserting the girl into other scenes. A notable example is the series of
  oil paintings commissioned from orderartwork.com by Parker Ito.


  ## Cultural Impact

  The meme illustrates how a simple stock image can achieve widespread
  recognition through repetitive exposure on parked domains, highlighting the
  economics of domain parking and ad-driven content.

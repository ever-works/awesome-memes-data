name: Young Thug at computer
description: Young Thug at computer is a meme featuring a 2018 photograph of
  rappers Young Thug and Lil Durk intently staring at a computer screen in a
  recording studio. The image became a template for humorous speculation about
  what the rappers were focusing on, ranging from elaborate heists to retro
  video games like Minesweeper.

markdown: >-
  ## Overview


  Young Thug at computer refers to a viral photo of rappers Young Thug and Lil
  Durk working in a studio, fixated on a computer screen. The ambiguous nature
  of their concentration led to widespread meme speculation.


  ## Origin


  The photograph was taken in 2018 during a studio session where Young Thug and
  Lil Durk were collaborating on music. The image shows both artists leaning
  towards a computer monitor, appearing deeply focused.


  ## Meme Usage


  Internet users began creating humorous captions imagining what the rappers
  were looking at, such as:

  - Planning a bank heist

  - Playing classic games like Minesweeper or Solitaire

  - Watching unusual videos

  - Reading contracts or lyrics


  The meme format typically places text above and below the image, describing
  the imagined scenario.


  ## Cultural Impact


  While not as enduring as some memes, it exemplifies how candid celebrity
  photos can be repurposed for absurdist humor online, particularly within
  hip-hop fan communities.

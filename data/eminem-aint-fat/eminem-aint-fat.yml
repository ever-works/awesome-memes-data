markdown: >-
  ## Overview


  The "Eminem ain't fat" meme uses a picture of the rapper Eminem, often
  accompanied by the caption asserting that he is not fat. It responds to
  recurring online commentary about his weight.


  ## Meaning


  The meme is used to push back against body‑shaming remarks, promoting a
  light‑hearted defense of Eminem’s appearance. It also exemplifies how meme
  culture repeatedly jokes about celebrity physiques.


  ## Origin


  The exact origin is unclear, but the phrase gained traction on social media
  platforms where users discuss Eminem’s looks, particularly during periods when
  his weight changed noticeably.


  ## Usage


  Typically shared as an image macro on Reddit, Twitter, and other platforms to
  humorously dismiss criticisms of Eminem’s body.


  ## Pricing


  Free to use and share.

name: Doge
description: Doge is a slang term for 'dog' primarily associated with pictures
  of Shiba Inus and internal monologue captions in Comic Sans font. The meme
  originated from photos of Kabosu, a Shiba Inu owned by Atsuko Sato, posted in
  2010. It has spawned numerous variants and remains a popular internet meme.

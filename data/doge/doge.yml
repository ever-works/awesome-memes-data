markdown: >
  ## Overview


  Doge is an internet meme featuring Shiba Inu dogs, particularly Kabosu,
  accompanied by multiline text in Comic Sans font representing an internal
  monologue.


  ## Origin


  The meme traces back to photos of Kabosu posted by Atsuko Sato on her blog in
  February 2010. The specific image of Kabosu sitting on a couch with a sideways
  glance became the iconic Doge image.


  ## Spread


  The meme spread through Tumblr, Reddit, and 4chan in 2012-2013, leading to the
  creation of subreddits like /r/Doge and numerous single-topic blogs. It gained
  further popularity with variants such as Ironic Doge, Cheems, and Swole Doge.


  ## Variants


  - Ironic Doge: Surreal or dark humor edits of the Doge image.

  - Cheems: A Doge variant known for misspelling words with extra 'M's.

  - Swole Doge: A muscular edit of the Doge character.

  - Wew Lad: Often accompanied by altered Doge images or the 'Wrinkle Face'
  illustration.
